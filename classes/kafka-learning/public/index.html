<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KAFKA</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #000;
        color: #fff;
        margin: 0;
        padding: 20px;
      }
      #map {
        height: 80vh;
      }
    </style>
  </head>
  <body>
    <h1>KAFKA</h1>
    <div id="map"></div>

    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/socket.io/socket.io.js"></script>

    <script>
      const socket = io();

      var map = L.map("map").setView([51.505, -0.09], 13);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "© OpenStreetMap",
      }).addTo(map);

      const remoteMarkers = new Map();

      socket.on("server-location-update", (data) => {
        console.log("Received data update from server:", data);
        const { latitude, longitude, id } = data;
        if (!remoteMarkers.has(id)) {
          const marker = L.marker([latitude, longitude]).addTo(map).bindPopup(id);
          remoteMarkers.set(id, marker);
        } else {
          remoteMarkers.get(id).setLatLng([latitude, longitude]);
        }
      });

      function getUserLocation() {
        return new Promise((resolve, reject) => {
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
              (position) => {
                const { latitude, longitude } = position.coords;
                resolve({ latitude, longitude });
              },
              (error) => {
                reject(error);
              },
            );
          } else {
            reject(new Error("Geolocation is not supported by this browser."));
          }
        });
      }

      getUserLocation()
        .then((location) => {
          console.log("User location:", location);
        })
        .catch((error) => {
          console.error("Error getting location:", error);
        });

      let myLocation = null;

      async function main() {
        setInterval(async () => {
          const { latitude, longitude } = await getUserLocation();
          socket.emit("client-location-update", {id:socket.id, latitude, longitude });
          console.log("Emitted location:", {id:socket.id, latitude, longitude });
          if (!myLocation) {
            myLocation = L.marker([latitude, longitude])
              .addTo(map)
              .bindPopup("You are here!");
          } else {
            myLocation.setLatLng([latitude, longitude]);
          }
        }, 10 * 1000); // 10 seconds
      }

      window.addEventListener("load", main);
    </script>
  </body>
</html>
